<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ペイフォワードキャンペーン第2弾</title>
    <meta name="description" content="2026年夏、成長の波をつなげるペイフォワードキャンペーン第2弾のご案内です。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="ambient" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <header class="site-header">
      <a class="brand" href="#top" aria-label="ページ先頭へ">PAY FORWARD</a>
      <nav class="nav" aria-label="ページ内リンク">
        <a href="#campaign-detail">詳細</a>
        <a href="#flow">流れ</a>
        <a href="#qa">Q&A</a>
      </nav>
    </header>

    <main id="top">
      <section class="visual-section hero reveal" aria-labelledby="hero-title">
        <h1 id="hero-title" class="sr-only">ペイフォワードキャンペーン第2弾</h1>
        <div class="visual-frame hero-frame product-composite composite-hero">
          <img src="assets/part-01.png" alt="ペイフォワードキャンペーン第2弾。開催期間は2026年7月1日から9月30日。">
          <span class="product-cover hero-immura-cover" aria-hidden="true"></span>
          <img class="replacement-product hero-immura" src="assets/immura60-cutout.png" alt="" aria-hidden="true">
          <a class="hero-hotspot" href="#campaign-detail" aria-label="キャンペーン詳細を見る"></a>
        </div>
      </section>

      <div class="sticky-cta" data-sticky-cta>
        <a href="#campaign-detail">
          <span>キャンペーン詳細を見る</span>
          <span aria-hidden="true">›</span>
        </a>
      </div>

      <section class="visual-section reveal" aria-labelledby="evolution-title">
        <h2 id="evolution-title" class="sr-only">第2弾の進化ポイント</h2>
        <div class="visual-frame product-composite composite-evolution">
          <img src="assets/part-02.png" alt="第2弾はここが進化。上限枠拡大、初回プレゼント、美容ジェル、ライン使い体験、縦紹介特典。">
          <span class="product-cover evo-gel-card-cover" aria-hidden="true"></span>
          <span class="product-cover evo-lotion-card-cover" aria-hidden="true"></span>
          <span class="product-cover evo-gel-line-cover" aria-hidden="true"></span>
          <span class="product-cover evo-lotion-line-cover" aria-hidden="true"></span>
          <span class="product-cover evo-immura-cover" aria-hidden="true"></span>
          <img class="replacement-product evo-gel-card" src="assets/hero-gel-cutout.png" alt="" aria-hidden="true">
          <img class="replacement-product evo-lotion-card" src="assets/hero-lotion-cutout.png" alt="" aria-hidden="true">
          <img class="replacement-product evo-gel-line" src="assets/hero-gel-cutout.png" alt="" aria-hidden="true">
          <img class="replacement-product evo-lotion-line" src="assets/hero-lotion-cutout.png" alt="" aria-hidden="true">
          <img class="replacement-product evo-immura" src="assets/immura60-cutout.png" alt="" aria-hidden="true">
        </div>
      </section>

      <section id="campaign-detail" class="visual-section reveal" aria-labelledby="detail-title">
        <h2 id="detail-title" class="sr-only">キャンペーン詳細</h2>
        <div class="section-ribbon">キャンペーン詳細</div>
        <div class="visual-frame focus-frame product-composite composite-detail">
          <img src="assets/part-03.png" alt="ペイフォワードのコンセプト、基本的な特典内容、無料招待枠の進呈について。">
          <span class="product-cover detail-gel-cover" aria-hidden="true"></span>
          <img class="replacement-product detail-gel" src="assets/hero-gel-cutout.png" alt="" aria-hidden="true">
        </div>
      </section>

      <section class="visual-section reveal" aria-labelledby="requirements-title">
        <h2 id="requirements-title" class="sr-only">費用、参加資格、定員のご案内</h2>
        <div class="visual-frame">
          <img src="assets/part-04.png" alt="ご負担いただく費用、参加資格、定員に関するご案内。">
        </div>
      </section>

      <section id="flow" class="visual-section reveal" aria-labelledby="flow-title">
        <h2 id="flow-title" class="sr-only">参加までの流れと確認事項</h2>
        <div class="visual-frame product-composite composite-flow">
          <img src="assets/part-05.png" alt="参加までの流れ、ご案内前に確認するポイント。">
          <span class="product-cover flow-lotion-cover" aria-hidden="true"></span>
          <span class="product-cover flow-gel-cover" aria-hidden="true"></span>
          <img class="replacement-product flow-lotion" src="assets/hero-lotion-cutout.png" alt="" aria-hidden="true">
          <img class="replacement-product flow-gel" src="assets/hero-gel-cutout.png" alt="" aria-hidden="true">
        </div>
      </section>

      <section id="qa" class="qa-section reveal" aria-labelledby="qa-title">
        <div class="qa-inner">
          <p class="qa-kicker">Coming Soon</p>
          <h2 id="qa-title">Q&A</h2>
          <p>よくある質問をここに追加予定です。</p>
          <div class="qa-placeholders" aria-label="Q&A追加予定枠">
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <a href="#top">ページ上部へ戻る</a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
